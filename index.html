    <style>
        :root {
            --bg: #050010;
            --panel: rgba(30, 15, 65, 0.85);
            --gold: #ffcc00;
            --gold-glow: 0 0 25px rgba(255, 204, 0, 0.7);
            --pink: #ff007a;
            --pink-glow: 0 0 30px rgba(255, 0, 122, 0.8);
            --blue: #00d4ff;
            --blue-glow: 0 0 25px rgba(0, 212, 255, 0.7);
            --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a0b3d 0%, var(--bg) 100%);
            color: #fff; margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }

        .screen { display: none; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

        header { text-align: center; margin-bottom: 35px; padding-top: 10px; }
        header h1 { 
            font-family: 'Secular One', sans-serif; font-size: 55px; margin: 0; 
            background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(var(--gold-glow)); 
        }
        header p { color: var(--blue); font-weight: 800; font-size: 14px; letter-spacing: 3px; text-shadow: 0 0 10px var(--blue); margin-top: -5px; }

        /* Main Menu Buttons */
        .main-btn {
            background: rgba(255, 255, 255, 0.04); border: 2px solid var(--gold); border-radius: 25px;
            color: white; padding: 25px 20px; font-size: 24px; font-weight: 800;
            cursor: pointer; margin-bottom: 20px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px var(--gold-glow); transition: 0.3s;
        }
        .main-btn.daily { border-color: var(--pink); box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px var(--pink-glow); }
        .main-btn.special { border-color: var(--blue); box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px var(--blue-glow); }
        
        .main-btn:active { transform: scale(0.96); opacity: 0.8; }
        .main-btn span { display: block; font-size: 13px; color: #aaa; margin-top: 8px; font-weight: 400; letter-spacing: 1px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 100px; }
        .prize-card {
            background: var(--panel); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 22px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .prize-card:active { border-color: var(--pink); box-shadow: var(--pink-glow); transform: translateY(-3px); }
        .p-icon { font-size: 40px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .p-name { font-size: 14px; font-weight: 700; color: var(--gold); text-shadow: 0 2px 5px #000; }

        /* Results */
        .result-card {
            background: linear-gradient(135deg, #1a0b3d, #050010);
            border: 5px solid var(--gold); border-radius: 40px;
            padding: 50px 25px; text-align: center; 
            box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 30px var(--gold-glow);
        }
        .share-btn { 
            background: linear-gradient(45deg, var(--blue), #00f2fe); color: #000; 
            border: none; padding: 22px; border-radius: 60px; font-weight: 800; font-size: 20px; 
            width: 100%; margin-top: 25px; box-shadow: 0 0 30px var(--blue); 
        }
        .back-link { text-align: center; margin-top: 35px; color: #bbb; cursor: pointer; text-decoration: underline; font-weight: 600; padding: 15px; font-size: 17px; }

        { t: "פינוק מתחת לשולחן", d: "3 דקות של מגע חבוי בזמן ארוחה.", i: "🍱", clean: false },
        { t: "הודעת טיזר", d: "שליחת הודעה או תמונה נועזת מהעבודה.", i: "📱", clean: false },
        { t: "המלצת הבזק", d: "שליחת לינק לסרטון שמתאר פנטזיה למימוש.", i: "🔗", clean: false }
    ];

    function showWeeklySelection() {
        renderGrid(weeklyPrizes, "היעד השבועי", "הפרס הגדול שמחכה לכם");
        switchScreen(null, 'list-screen');
    }

    function revealDaily(mode) {
        let list = dailyPrizes;
        if (mode === 'clean') {
            list = dailyPrizes.filter(p => p.clean === true);
        }
        const prize = list[Math.floor(Math.random() * list.length)];
        lastScreen = 'home';
        showResult(prize, mode === 'clean' ? "טיזר יומי מיוחד" : "טיזר יומי לוהט");
    }

    function renderGrid(prizes, title, subtitle) {
        document.getElementById('list-title').innerText = title;
        document.getElementById('list-subtitle').innerText = subtitle;
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        prizes.sort(() => Math.random() - 0.5).forEach(p => {
            const card = document.createElement('div');
            card.className = 'prize-card';
            card.onclick = () => { scrollPos = window.scrollY; lastScreen = 'list-screen'; showResult(p, title); };
            card.innerHTML = `<span class="p-icon">${p.i}</span><span class="p-name">${p.t}</span>`;
            grid.appendChild(card);
        });
    }

    function showResult(p, label) {
        document.getElementById('res-label').innerText = label;
        document.getElementById('res-icon').innerText = p.i;
        document.getElementById('res-title').innerText = p.t;
        document.getElementById('res-desc').innerText = p.d;
        switchScreen(null, 'share-screen');
    }

    function handleBack() {
        switchScreen('share-screen', lastScreen);
        if (lastScreen === 'list-screen') setTimeout(() => window.scrollTo(0, scrollPos), 20);
    }

    function goToHome() { switchScreen(null, 'home'); }

    function switchScreen(from, to) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(to).classList.add('active');
        if (to === 'home') window.scrollTo(0,0);
    }

    function saveAndShare() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { backgroundColor: '#050010', scale: 2 }).then(canvas => {
            const imgData = canvas.toDataURL("image/png");
            const newWin = window.open();
            newWin.document.write('<body style="background:#050010; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0;"><img src="' + imgData + '" style="max-width:90%; border:3px solid #ffcc00; border-radius:20px;"><h2 style="color:white; font-family:sans-serif; margin-top:20px;">לחיצה ארוכה על התמונה לשמירה</h2><button onclick="window.close()" style="margin-top:20px; padding:15px 30px; background:#00d4ff; border:none; border-radius:50px; font-weight:bold; cursor:pointer;">חזור למשחק</button></body>');
        });
    }
</script>
</body>
</html>
